name: Deploy to GitHub Pages

on:
  # 💡 偵測當 main 分支有新的 push 時，觸發這個機器人
  push:
    branches: [ main ]
  # 允許手動觸發
  workflow_dispatch:

# 賦予機器人部署網頁的權限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 複製專案程式碼
        uses: actions/checkout@v4

      - name: 📦 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: 22 # ✨ 這裡已經幫妳改成最新的 22 囉！
          cache: 'npm'

      - name: 📥 安裝專案依賴套件
        run: npm ci

      - name: 🏗️ 執行 Astro 打包
        run: npm run build

      - name: 📤 上傳打包成果到 GitHub Pages
        uses: actions/upload-pages-artifact@v3 # ✨ 順便幫妳補上最新版的上傳小幫手
        with:
          path: dist

      - name: 🚀 部署到雲端
        uses: actions/deploy-pages@v4